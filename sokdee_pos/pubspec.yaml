name: sokdee_pos
description: SOKDEE POS — Multi-tenant SaaS Point-of-Sale for Lao market
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Network
  dio: ^5.4.3
  web_socket_channel: ^3.0.1

  # Localization
  intl: ^0.19.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/fonts/

  fonts: []
